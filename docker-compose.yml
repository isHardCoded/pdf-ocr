services:
  backend:
    build: ./backend
    container_name: pdf-reader-backend
    restart: unless-stopped
    environment:
      DATA_DIR: /data
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: pdf-reader-frontend
    restart: unless-stopped
    environment:
      # Server-side proxy (app/api/[[...path]]) must use Docker service name, not localhost
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
