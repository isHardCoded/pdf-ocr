services:
  api:
    build: ./api
    container_name: pdf-reader-api
    restart: unless-stopped
    environment:
      DATA_DIR: /data
      DATABASE_URL: file:/data/app.db
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:8000/health',(r)=>{let c='';r.on('data',(d)=>c+=d);r.on('end',()=>process.exit(r.statusCode===200?0:1))}).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build: ./backend
    container_name: pdf-reader-ocr-worker
    restart: unless-stopped
    environment:
      DATA_DIR: /data
    volumes:
      - ./data:/data
    depends_on:
      api:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: pdf-reader-frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
