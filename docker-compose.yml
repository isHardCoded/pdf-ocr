services:
  db:
    image: postgres:16-alpine
    container_name: pdf-reader-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-pdf_ocr}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pdf_ocr"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: pdf-reader-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATA_DIR: /data
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/pdf_ocr}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:8000/health',(r)=>{let c='';r.on('data',(d)=>c+=d);r.on('end',()=>process.exit(r.statusCode===200?0:1))}).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build: ./backend
    container_name: pdf-reader-ocr-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATA_DIR: /data
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/pdf_ocr}
    volumes:
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://127.0.0.1:8000}
    container_name: pdf-reader-frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
